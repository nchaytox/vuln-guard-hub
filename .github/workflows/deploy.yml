name: Build & Push Images (GHCR)

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_SERVER: vulnguard-server
  IMAGE_CLIENT: vulnguard-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: vars
        run: |
          SHA_TAG=${GITHUB_SHA::12}
          echo "server_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_SERVER }}:${SHA_TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_SERVER }}:latest" >> $GITHUB_OUTPUT
          echo "client_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_CLIENT }}:${SHA_TAG},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_CLIENT }}:latest" >> $GITHUB_OUTPUT

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.prod
          push: true
          tags: ${{ steps.vars.outputs.server_tags }}

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile.prod
          push: true
          tags: ${{ steps.vars.outputs.client_tags }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:3001' }}

