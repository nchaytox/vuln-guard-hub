name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  deps-and-audit:
    name: Install & Audit (server/client)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install deps (server)
        working-directory: server
        run: npm ci

      - name: Audit (server, fail on high)
        working-directory: server
        run: npm audit --production --audit-level=high

      - name: Setup Node (client)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install deps (client)
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build --if-present

      - name: Audit (client, warn only)
        working-directory: client
        run: |
          npm audit --production --audit-level=high || echo "Client audit warnings ignored"

  docker-and-trivy:
    name: Build Images & Trivy Scan
    runs-on: ubuntu-latest
    needs: deps-and-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.prod
          push: false
          tags: local/vulnguard-server:ci

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile.prod
          push: false
          tags: local/vulnguard-client:ci
          build-args: |
            VITE_API_URL=http://localhost:3001

      - name: Trivy FS (repo)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Trivy Image (server)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/vulnguard-server:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Trivy Image (client)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/vulnguard-client:ci
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          generateSarif: true
          uploadSarif: false
